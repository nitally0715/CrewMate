AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  CrewMate - 건설 일용직 작업조 편성 서버리스 백엔드 (계약 v2).
  DynamoDB 엔터티별 테이블 8종 + Cognito + API Gateway + 코어/Agent Lambda.

# ---------------------------------------------------------------------------
# 파라미터
# ---------------------------------------------------------------------------
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: 배포 스테이지

  CorsAllowOrigin:
    Type: String
    Default: "*"
    Description: >
      CORS 허용 오리진. 배포 시 배포된 CloudFront 오리진으로 좁힐 수 있다
      (예: https://d1872k8ivu18th.cloudfront.net). 기본값은 개발 편의를 위한 전체 허용.

  # --- Crew Composition Agent 설정 (비밀 아님) ---
  CrewAgentModelId:
    Type: String
    Default: global.anthropic.claude-sonnet-4-6
    Description: Amazon Bedrock 모델(추론 프로파일) ID.
  CrewAgentFoundationModelId:
    Type: String
    Default: anthropic.claude-sonnet-4-6
    Description: Crew Agent 추론 프로파일의 기반 모델 ID. InvokeModel IAM 범위에 사용.
  CrewAgentRegion:
    Type: String
    Default: ap-northeast-2
    Description: Bedrock 호출 리전 (CREW_AGENT_REGION).
  CrewAgentTemperature:
    Type: String
    Default: "0.2"
  AgentFallbackEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Bedrock 호출·검증 실패 시 결정론적 규칙 기반 추천으로 폴백할지 여부.
  AgentInvokeTimeoutSeconds:
    Type: String
    Default: "90"
    Description: 단일 Bedrock compose 호출의 벽시계 상한(초).

  # --- Applicant Spec Gap Report Agent 설정 ---
  ReportModelId:
    Type: String
    Default: global.anthropic.claude-sonnet-4-6
    Description: 보고서 작성용 Bedrock 모델 또는 inference profile ID.
  ReportFoundationModelId:
    Type: String
    Default: anthropic.claude-sonnet-4-6
    Description: Foundation model behind ReportModelId; used to scope InvokeModel IAM access.
  ReportModelRegion:
    Type: String
    Default: ap-northeast-2
  ReportModelTemperature:
    Type: String
    Default: "0.1"
  ReportAgentTimeoutSeconds:
    Type: String
    Default: "60"
  KnowledgeBaseId:
    Type: String
    Default: ""
    Description: 별도로 생성·동기화한 Amazon Bedrock Knowledge Base ID. 빈 값이면 KB 미구성으로 명시한다.
  KnowledgeBaseRegion:
    Type: String
    Default: ap-northeast-2
    Description: 외부 Amazon Bedrock Knowledge Base 리전.
  KbNumberOfResults:
    Type: String
    Default: "5"
  KbReviewStatus:
    Type: String
    Default: 구조화원본
    Description: Retrieve metadata filter. 검토되지 않은 자동 추천 문서와 구조화 원본을 분리한다.
  QnetCacheTtlSeconds:
    Type: String
    Default: "604800"
  ReportRetentionDays:
    Type: Number
    Default: 61
    MinValue: 61
  ReportStandardIaTransitionDays:
    Type: Number
    Default: 31
    MinValue: 31

Conditions:
  HasKnowledgeBase: !Not [!Equals [!Ref KnowledgeBaseId, ""]]

# ---------------------------------------------------------------------------
# 전역 설정
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 256
    Architectures: [x86_64]
    Environment:
      Variables:
        WORKERS_TABLE: !Ref WorkersTable
        OFFICES_TABLE: !Ref OfficesTable
        COMPANIES_TABLE: !Ref CompaniesTable
        REQUESTS_TABLE: !Ref RequestsTable
        CREWS_TABLE: !Ref CrewsTable
        ASSIGNMENTS_TABLE: !Ref AssignmentsTable
        GAP_EVENTS_TABLE: !Ref GapEventsTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
        POWERTOOLS_SERVICE_NAME: crewmate
        LOG_LEVEL: INFO
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: !Sub "'${CorsAllowOrigin}'"

Resources:
  # =========================================================================
  # DynamoDB 엔터티별 테이블 8종 (계약 v2)
  # =========================================================================
  WorkersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Workers-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: worker_id, AttributeType: S }
        - { AttributeName: office_id, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
      KeySchema:
        - { AttributeName: worker_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: office_id, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  OfficesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Offices-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: office_id, AttributeType: S }
      KeySchema:
        - { AttributeName: office_id, KeyType: HASH }

  CompaniesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Companies-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: company_id, AttributeType: S }
      KeySchema:
        - { AttributeName: company_id, KeyType: HASH }

  RequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Requests-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: request_id, AttributeType: S }
        - { AttributeName: office_id, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
        - { AttributeName: company_id, AttributeType: S }
      KeySchema:
        - { AttributeName: request_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: office_id, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI2
          KeySchema:
            - { AttributeName: company_id, KeyType: HASH }
            - { AttributeName: request_id, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  CrewsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Crews-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: crew_id, AttributeType: S }
        - { AttributeName: office_id, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
      KeySchema:
        - { AttributeName: crew_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: office_id, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  AssignmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Assignments-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: crew_id, AttributeType: S }
        - { AttributeName: worker_id, AttributeType: S }
        - { AttributeName: created_at, AttributeType: S }
      KeySchema:
        - { AttributeName: crew_id, KeyType: HASH }
        - { AttributeName: worker_id, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: worker_id, KeyType: HASH }
            - { AttributeName: created_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  GapEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-GapEvents-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: event_id, AttributeType: S }
        - { AttributeName: office_id, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
      KeySchema:
        - { AttributeName: event_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: office_id, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-Notifications-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: user_id, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
      KeySchema:
        - { AttributeName: user_id, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }

  # =========================================================================
  # Spec Gap Report: source/output storage, cache, and metadata
  # =========================================================================
  ReportKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub "CrewMate spec report encryption key (${Stage})"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal: { AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" }
            Action: "kms:*"
            Resource: "*"

  ReportKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/crewmate-spec-reports-${Stage}"
      TargetKeyId: !Ref ReportKmsKey

  KnowledgeSourceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      VersioningConfiguration: { Status: Enabled }

  KnowledgeSourceBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref KnowledgeSourceBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt KnowledgeSourceBucket.Arn
              - !Sub "${KnowledgeSourceBucket.Arn}/*"
            Condition: { Bool: { "aws:SecureTransport": "false" } }

  ReportOutputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ReportKmsKey.Arn
            BucketKeyEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireApplicantReports
            Status: Enabled
            Prefix: reports/
            ObjectSizeGreaterThan: 0
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: !Ref ReportStandardIaTransitionDays
            ExpirationInDays: !Ref ReportRetentionDays

  ReportOutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReportOutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ReportOutputBucket.Arn
              - !Sub "${ReportOutputBucket.Arn}/*"
            Condition: { Bool: { "aws:SecureTransport": "false" } }

  QualificationEvidenceCache:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-QualificationEvidenceCache-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: normalized_name, AttributeType: S }
      KeySchema:
        - { AttributeName: normalized_name, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification: { SSEEnabled: true }

  SpecReportJobs:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "CrewMate-SpecReportJobs-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: report_id, AttributeType: S }
      KeySchema:
        - { AttributeName: report_id, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      SSESpecification: { SSEEnabled: true }

  AgentDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "crewmate-agent-deps-${Stage}"
      ContentUri: layers/agent_deps/
      CompatibleRuntimes: [python3.12]
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.12

  ReportDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "crewmate-report-deps-${Stage}"
      ContentUri: layers/report_deps/
      CompatibleRuntimes: [python3.13]
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: python3.13

  # =========================================================================
  # Cognito User Pool (username 로그인, custom claim: role/office_id/company_id/region)
  # =========================================================================
  # username 로그인 풀(v2). 기존 이메일 기반 풀은 UsernameAttributes 변경 불가라 새 논리 ID로 신규 생성한다.
  UserPoolV2:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "CrewMate-${Stage}-v2"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: false
      Schema:
        - { Name: role, AttributeDataType: String, Mutable: true, StringAttributeConstraints: { MinLength: "0", MaxLength: "16" } }
        - { Name: office_id, AttributeDataType: String, Mutable: true, StringAttributeConstraints: { MinLength: "0", MaxLength: "64" } }
        - { Name: company_id, AttributeDataType: String, Mutable: true, StringAttributeConstraints: { MinLength: "0", MaxLength: "64" } }
        - { Name: region, AttributeDataType: String, Mutable: true, StringAttributeConstraints: { MinLength: "0", MaxLength: "64" } }

  UserPoolClientV2:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "CrewMate-${Stage}-web"
      UserPoolId: !Ref UserPoolV2
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 12
      IdTokenValidity: 12
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours

  WorkerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: { GroupName: WORKER, UserPoolId: !Ref UserPoolV2 }
  OfficeGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: { GroupName: OFFICE, UserPoolId: !Ref UserPoolV2 }
  CompanyGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties: { GroupName: COMPANY, UserPoolId: !Ref UserPoolV2 }

  # =========================================================================
  # API Gateway (REST) + Cognito Authorizer (기본), 일부 라우트는 공개
  # =========================================================================
  CrewMateApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "CrewMate-${Stage}"
      StageName: !Ref Stage
      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            UserPoolArn: !GetAtt UserPoolV2.Arn
        AddDefaultAuthorizerToCorsPreflight: false

  # =========================================================================
  # auth Lambda (공개 라우트: signup / login / offices)
  # =========================================================================
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-auth-${Stage}"
      CodeUri: backend/
      Handler: functions.auth.app.lambda_handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolV2
          USER_POOL_CLIENT_ID: !Ref UserPoolClientV2
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref OfficesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CompaniesTable }
        - DynamoDBReadPolicy: { TableName: !Ref WorkersTable }
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminInitiateAuth
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt UserPoolV2.Arn
      Events:
        Signup:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /auth/signup, Method: post, Auth: { Authorizer: NONE } }
        Login:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /auth/login, Method: post, Auth: { Authorizer: NONE } }
        ListOffices:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /offices, Method: get, Auth: { Authorizer: NONE } }

  # =========================================================================
  # worker_api Lambda
  # =========================================================================
  WorkerApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-worker-api-${Stage}"
      CodeUri: backend/
      Handler: functions.worker_api.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref WorkersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AssignmentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CrewsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RequestsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref GapEventsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
      Events:
        CreateApplication:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/application, Method: post }
        UpdateApplication:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/application, Method: put }
        GetMe:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/me, Method: get }
        StateReady:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/state/ready, Method: post }
        StateInactive:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/state/inactive, Method: post }
        OfferAccept:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/offer/accept, Method: post }
        OfferDecline:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/offer/decline, Method: post }
        CancelReservation:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/reservation/cancel, Method: post }
        GetAssignments:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/assignments, Method: get }
        GetAcceptedJobs:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/accepted-jobs, Method: get }
        GetAttendance:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/attendance, Method: get }
        GetWageStats:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/worker/wage-stats/{careerYears}", Method: get }
        GetHistory:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /worker/history, Method: get }

  # =========================================================================
  # company_request Lambda
  # =========================================================================
  CompanyRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-company-request-${Stage}"
      CodeUri: backend/
      Handler: functions.company_request.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref RequestsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CrewsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref WorkersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AssignmentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref GapEventsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - DynamoDBReadPolicy: { TableName: !Ref OfficesTable }
      Events:
        CreateRequest:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /company/requests, Method: post }
        UpdateRequest:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/company/requests/{requestId}", Method: put }
        ListRequests:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /company/requests, Method: get }
        GetRequest:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/company/requests/{requestId}", Method: get }
        CancelRequest:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/company/requests/{requestId}/cancel", Method: post }
        Checkin:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/company/crews/{crewId}/checkin/{workerId}", Method: post }
        Checkout:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/company/crews/{crewId}/checkout/{workerId}", Method: post }
        CreateGapEvent:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/company/crews/{crewId}/gap-events", Method: post }

  # =========================================================================
  # office_core Lambda
  # =========================================================================
  OfficeCoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-office-core-${Stage}"
      CodeUri: backend/
      Handler: functions.office_core.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref WorkersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RequestsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CrewsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AssignmentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref GapEventsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - DynamoDBReadPolicy: { TableName: !Ref CompaniesTable }
        - DynamoDBReadPolicy: { TableName: !Ref OfficesTable }
      Events:
        ListWorkers:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /office/workers, Method: get }
        GetWorkerDetail:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/workers/{workerId}", Method: get }
        ListRequests:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /office/requests, Method: get }
        GetRequest:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/requests/{requestId}", Method: get }
        RejectRequest:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/requests/{requestId}/reject", Method: post }
        CreateManualCrew:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /office/crews/manual, Method: post }
        FillGap:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/crews/{crewId}/fill-gap", Method: post }
        CancelComposition:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/crews/{crewId}/cancel-composition", Method: post }
        CancelOffer:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /office/cancel-offer, Method: post }
        ListGapEvents:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /office/gap-events, Method: get }
        GetGapEvent:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/gap-events/{eventId}", Method: get }

  # =========================================================================
  # assignment Lambda (승인 / 긴급 승인 — TransactWriteItems)
  # =========================================================================
  AssignmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-assignment-${Stage}"
      CodeUri: backend/
      Handler: functions.assignment.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref WorkersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CrewsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RequestsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AssignmentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref GapEventsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
      Events:
        ApproveCrew:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/crews/{crewId}/approve", Method: post }
        ApproveEmergency:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/emergency/{eventId}/approve", Method: post }

  # =========================================================================
  # notification Lambda
  # =========================================================================
  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-notification-${Stage}"
      CodeUri: backend/
      Handler: functions.notification.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
      Events:
        ListNotifications:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /notifications, Method: get }
        ReadNotifications:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /notifications/read, Method: post }

  # =========================================================================
  # Crew Composition Strands Agent (NORMAL agent-compose / EMERGENCY agent-recompose)
  # =========================================================================
  AgentInvokeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-agent-invoke-${Stage}"
      CodeUri: backend/
      Handler: functions.agent_invoke.app.lambda_handler
      Timeout: 120
      MemorySize: 512
      Layers:
        - !Ref AgentDepsLayer
      Environment:
        Variables:
          CREW_AGENT_MODEL_ID: !Ref CrewAgentModelId
          CREW_AGENT_REGION: !Ref CrewAgentRegion
          CREW_AGENT_TEMPERATURE: !Ref CrewAgentTemperature
          AGENT_FALLBACK_ENABLED: !Ref AgentFallbackEnabled
          AGENT_INVOKE_TIMEOUT_S: !Ref AgentInvokeTimeoutSeconds
          CREW_AGENT_ASYNC_ENABLED: "true"
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref CrewsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref GapEventsTable }
        # agent-compose 는 요청 상태를 PROPOSED 로 갱신하므로 Requests 에 쓰기 필요.
        - DynamoDBCrudPolicy: { TableName: !Ref RequestsTable }
        - DynamoDBReadPolicy: { TableName: !Ref WorkersTable }
        - DynamoDBReadPolicy: { TableName: !Ref AssignmentsTable }
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:*::foundation-model/${CrewAgentFoundationModelId}"
                - !Sub "arn:aws:bedrock:${CrewAgentRegion}:${AWS::AccountId}:inference-profile/${CrewAgentModelId}"
            - Effect: Allow
              Action: [lambda:InvokeFunction]
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:crewmate-agent-invoke-${Stage}"
      Events:
        AgentCompose:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/requests/{requestId}/agent-compose", Method: post }
        AgentRecompose:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/office/gap-events/{eventId}/agent-recompose", Method: post }

  # =========================================================================
  # Applicant Spec Gap Report Agent (deterministic rules + two evidence tools)
  # =========================================================================
  SpecReportAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "crewmate-spec-report-agent-${Stage}"
      Runtime: python3.13
      CodeUri: backend/
      Handler: functions.spec_report.app.lambda_handler
      Timeout: 180
      MemorySize: 1024
      Layers:
        - !Ref ReportDepsLayer
      Environment:
        Variables:
          REPORT_MODEL_ID: !Ref ReportModelId
          REPORT_MODEL_REGION: !Ref ReportModelRegion
          REPORT_MODEL_TEMPERATURE: !Ref ReportModelTemperature
          REPORT_AGENT_TIMEOUT_SECONDS: !Ref ReportAgentTimeoutSeconds
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
          KNOWLEDGE_BASE_REGION: !Ref KnowledgeBaseRegion
          KB_NUMBER_OF_RESULTS: !Ref KbNumberOfResults
          KB_REVIEW_STATUS: !Ref KbReviewStatus
          KNOWLEDGE_SOURCE_BUCKET: !Ref KnowledgeSourceBucket
          RULES_PREFIX: rules/
          REPORT_OUTPUT_BUCKET: !Ref ReportOutputBucket
          REPORT_KMS_KEY_ID: !GetAtt ReportKmsKey.Arn
          QUALIFICATION_CACHE_TABLE: !Ref QualificationEvidenceCache
          SPEC_REPORT_JOBS_TABLE: !Ref SpecReportJobs
          QNET_CACHE_TTL_SECONDS: !Ref QnetCacheTtlSeconds
          QNET_TIMEOUT_SECONDS: "5"
          QNET_MAX_RETRIES: "1"
          QNET_MIN_INTERVAL_SECONDS: "0.5"
          REPORT_JOBS_TTL_SECONDS: "5270400"
      Policies:
        - Statement:
            - Sid: QualificationEvidenceCacheAccess
              Effect: Allow
              Action: [dynamodb:GetItem, dynamodb:PutItem]
              Resource: !GetAtt QualificationEvidenceCache.Arn
            - Sid: SpecReportJobMetadataAccess
              Effect: Allow
              Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem]
              Resource: !GetAtt SpecReportJobs.Arn
            - Sid: ReadAuthoritativeRules
              Effect: Allow
              Action: [s3:GetObject]
              Resource: !Sub "${KnowledgeSourceBucket.Arn}/rules/*"
            - Sid: ReadWriteRequestedReportsOnly
              Effect: Allow
              Action: [s3:GetObject, s3:PutObject]
              Resource: !Sub "${ReportOutputBucket.Arn}/reports/*"
            - Sid: EncryptRequestedReports
              Effect: Allow
              Action: [kms:Encrypt, kms:Decrypt, kms:GenerateDataKey]
              Resource: !GetAtt ReportKmsKey.Arn
            - Sid: InvokeAsyncReportWorker
              Effect: Allow
              Action: [lambda:InvokeFunction]
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:crewmate-spec-report-agent-${Stage}"
            - Sid: RetrieveConfiguredKnowledgeBase
              Effect: Allow
              Action: [bedrock:Retrieve]
              Resource: !If
                - HasKnowledgeBase
                - !Sub "arn:aws:bedrock:${KnowledgeBaseRegion}:${AWS::AccountId}:knowledge-base/${KnowledgeBaseId}"
                - !Sub "arn:aws:bedrock:${KnowledgeBaseRegion}:${AWS::AccountId}:knowledge-base/UNCONFIGURED"
            - Sid: InvokeReportModel
              Effect: Allow
              Action: [bedrock:InvokeModel, bedrock:InvokeModelWithResponseStream]
              Resource:
                - !Sub "arn:aws:bedrock:*::foundation-model/${ReportFoundationModelId}"
                - !Sub "arn:aws:bedrock:${ReportModelRegion}:${AWS::AccountId}:inference-profile/${ReportModelId}"
      Events:
        GenerateSpecReport:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /reports/spec-gap, Method: post }
        StartSpecReportJob:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: /reports/spec-gap/jobs, Method: post }
        GetSpecReportJob:
          Type: Api
          Properties: { RestApiId: !Ref CrewMateApi, Path: "/reports/spec-gap/jobs/{reportId}", Method: get }

# ---------------------------------------------------------------------------
# 출력값
# ---------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: API Gateway 엔드포인트
    Value: !Sub "https://${CrewMateApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPoolV2
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClientV2
  WorkersTableName:
    Value: !Ref WorkersTable
  OfficesTableName:
    Value: !Ref OfficesTable
  CompaniesTableName:
    Value: !Ref CompaniesTable
  RequestsTableName:
    Value: !Ref RequestsTable
  CrewsTableName:
    Value: !Ref CrewsTable
  AssignmentsTableName:
    Value: !Ref AssignmentsTable
  GapEventsTableName:
    Value: !Ref GapEventsTable
  NotificationsTableName:
    Value: !Ref NotificationsTable
  KnowledgeSourceBucketName:
    Description: Upload rules/ and knowledge-base/ assets here before KB sync.
    Value: !Ref KnowledgeSourceBucket
  ReportOutputBucketName:
    Value: !Ref ReportOutputBucket
  QualificationEvidenceCacheTableName:
    Value: !Ref QualificationEvidenceCache
  SpecReportJobsTableName:
    Value: !Ref SpecReportJobs
  ReportKmsKeyArn:
    Value: !GetAtt ReportKmsKey.Arn
  SpecReportApiPath:
    Value: !Sub "https://${CrewMateApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/reports/spec-gap"
  SpecReportFunctionName:
    Value: !Ref SpecReportAgentFunction
  ExternalKnowledgeBaseId:
    Condition: HasKnowledgeBase
    Value: !Ref KnowledgeBaseId
