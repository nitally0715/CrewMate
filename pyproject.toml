# CrewMate - 담당자 B (Crew Composition Agent / Agent Invoke / Gap Event) scope.
#
# This file configures the Python test tooling only. Runtime packaging and
# deployment (SAM / DynamoDB / Cognito / API Gateway) are owned by 담당자 A.
#
# Import-path note (unified with 담당자 A's packaging):
#   Runtime code now uses A's convention — `functions.*` / `shared.*` imports rooted at
#   `backend/` (CodeUri: backend/), and the Agent package lives at `backend/agent/` so it
#   is imported as `agent.*` from that same root. `tests/conftest.py` (A) puts `backend/`
#   on sys.path, so those imports resolve in dev/test exactly as in the deployed bundle.
#   `pythonpath = ["."]` additionally places the WORKSPACE ROOT on sys.path so the shared
#   test helpers `tests.mocks.*` / `tests.strategies` (workspace-rooted packages) resolve.

[tool.pytest.ini_options]
minversion = "7.4"
pythonpath = ["."]
testpaths = ["backend", "tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra --strict-markers"
markers = [
    "property: property-based test that validates a design.md Correctness Property",
]
